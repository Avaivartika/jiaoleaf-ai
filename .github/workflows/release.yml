name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Package unified install bundle
        run: npm run pack
      - name: Verify unified bundle
        run: |
          BUNDLE_ZIP="release/jiaoleaf-ai-${GITHUB_REF_NAME}.zip"
          test -f "$BUNDLE_ZIP"
          unzip -Z1 "$BUNDLE_ZIP" | grep -qx 'manifest.json'
          unzip -Z1 "$BUNDLE_ZIP" | grep -qx 'host/package.json'
          unzip -Z1 "$BUNDLE_ZIP" | grep -qx 'start-jiaoleaf-host.cmd'
          unzip -Z1 "$BUNDLE_ZIP" | grep -qx 'login-codex.cmd'
          node -e "const AdmZip=require('adm-zip'); const zip=new AdmZip(process.argv[1]); JSON.parse(zip.getEntry('manifest.json').getData().toString('utf8')); console.log('manifest ok')" "$BUNDLE_ZIP"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUNDLE_ZIP="release/jiaoleaf-ai-${GITHUB_REF_NAME}.zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release delete-asset "$GITHUB_REF_NAME" "jiaoleaf-ai-host-source-${GITHUB_REF_NAME}.zip" -y || true
            gh release upload "$GITHUB_REF_NAME" "$BUNDLE_ZIP" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$BUNDLE_ZIP" \
              --title "JiaoLeaf AI ${GITHUB_REF_NAME}" \
              --notes "Single bundle: load the extracted root in chrome://extensions, run login-codex once if needed, then start the local host helper. OpenAI defaults to local Codex CLI/ChatGPT login; API-key mode is optional."
          fi
